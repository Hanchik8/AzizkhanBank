spring:
  application:
    name: fraud-service
  kafka:
    bootstrap-servers: kafka:9092
    streams:
      application-id: fraud-detector

app:
  kafka:
    topics:
      outbox-events: account.events.v1
      fraud-alerts: fraud.alerts

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
